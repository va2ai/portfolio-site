<body style="margin: 0; background: #07080d;">

  <!-- Back to portfolio -->
  <nav class="back-nav">
    <a href="/">&larr; Back to Portfolio</a>
    <span class="title">Hybrid Architecture Demo</span>
  </nav>

  <div id="demo-root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const SCENARIOS = [
      {
        id: "ltv",
        label: "LTV:CAC Ratio",
        question: "What's my LTV to CAC ratio? Am I spending too much to acquire customers?",
        payload: {
          seller_id: "SLR-4821",
          period: "2026-Q1",
          avg_order_value: 67.30,
          orders_per_customer_per_year: 3.2,
          gross_margin_pct: 0.42,
          avg_customer_lifespan_years: 2.7,
          ad_spend: 12400.00,
          marketing_salaries: 8500.00,
          marketing_software: 1900.00,
          new_customers_acquired: 310,
          ltv: null,
          cac: null,
          ltv_cac_ratio: null,
        },
      },
      {
        id: "blended",
        label: "Blended ROAS",
        question: "What's my blended return on ad spend across all channels?",
        payload: {
          seller_id: "SLR-4821",
          period: "2026-03",
          channels: {
            google: { spend: 5830.00, attributed_revenue: 28400.00, conversions: 142 },
            meta: { spend: 3200.00, attributed_revenue: 11750.00, conversions: 89 },
            tiktok: { spend: 1750.00, attributed_revenue: 4100.00, conversions: 31 },
            email: { spend: 420.00, attributed_revenue: 19200.00, conversions: 204 },
          },
          total_spend: null,
          total_attributed_revenue: null,
          blended_roas: null,
          best_channel: null,
          worst_channel: null,
          cost_per_conversion: null,
        },
      },
      {
        id: "runway",
        label: "Cash Runway",
        question: "How many months of runway do I have left? Should I be worried?",
        payload: {
          seller_id: "SLR-4821",
          period: "2026-03",
          cash_on_hand: 142000.00,
          monthly_revenue: 48750.00,
          monthly_cogs: 31200.00,
          monthly_payroll: 22400.00,
          monthly_rent: 3200.00,
          monthly_software: 1850.00,
          monthly_marketing: 6200.00,
          monthly_other: 980.00,
          accounts_receivable: 18500.00,
          accounts_payable: 9200.00,
          monthly_burn: null,
          net_cash_flow: null,
          runway_months: null,
          net_working_capital_adjustment: null,
        },
      },
      {
        id: "cohort",
        label: "Cohort Retention",
        question: "How is my January cohort performing? What's the projected lifetime revenue?",
        payload: {
          seller_id: "SLR-4821",
          cohort: "2026-01",
          initial_customers: 285,
          month_1_active: 285,
          month_2_active: 198,
          month_3_active: 156,
          month_1_revenue: 19237.50,
          month_2_revenue: 14652.00,
          month_3_revenue: 12480.00,
          avg_revenue_per_active: null,
          retention_rate_m2: null,
          retention_rate_m3: null,
          projected_12mo_revenue: null,
        },
      },
    ];

    function computeDerivedFields(payload) {
      const computed = JSON.parse(JSON.stringify(payload));
      const steps = [];

      // ── LTV:CAC Ratio (4-step chain) ──
      if ("avg_order_value" in payload && "orders_per_customer_per_year" in payload && "gross_margin_pct" in payload && "avg_customer_lifespan_years" in payload && payload.ltv === null) {
        const annualValue = payload.avg_order_value * payload.orders_per_customer_per_year;
        const grossProfit = annualValue * payload.gross_margin_pct;
        computed.ltv = Math.round(grossProfit * payload.avg_customer_lifespan_years * 100) / 100;
        steps.push({
          type: "calculate",
          label: "Annual Customer Value",
          code: `$${payload.avg_order_value} × ${payload.orders_per_customer_per_year} orders/yr`,
          result: `$${annualValue.toFixed(2)}`,
        });
        steps.push({
          type: "calculate",
          label: "Annual Gross Profit",
          code: `$${annualValue.toFixed(2)} × ${payload.gross_margin_pct} margin`,
          result: `$${grossProfit.toFixed(2)}`,
        });
        steps.push({
          type: "calculate",
          label: "Lifetime Value (LTV)",
          code: `$${grossProfit.toFixed(2)} × ${payload.avg_customer_lifespan_years} years`,
          result: `$${computed.ltv.toLocaleString()}`,
        });
      }

      if ("ad_spend" in payload && "marketing_salaries" in payload && "marketing_software" in payload && "new_customers_acquired" in payload && payload.cac === null) {
        const totalMktg = payload.ad_spend + payload.marketing_salaries + payload.marketing_software;
        computed.cac = Math.round((totalMktg / payload.new_customers_acquired) * 100) / 100;
        steps.push({
          type: "calculate",
          label: "Total Acq. Cost",
          code: `$${payload.ad_spend.toLocaleString()} + $${payload.marketing_salaries.toLocaleString()} + $${payload.marketing_software.toLocaleString()}`,
          result: `$${totalMktg.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "CAC",
          code: `$${totalMktg.toLocaleString()} / ${payload.new_customers_acquired} customers`,
          result: `$${computed.cac}`,
        });
      }

      if (computed.ltv !== null && computed.cac !== null && payload.ltv_cac_ratio === null) {
        computed.ltv_cac_ratio = Math.round((computed.ltv / computed.cac) * 100) / 100;
        steps.push({
          type: "calculate",
          label: "LTV:CAC Ratio",
          code: `$${computed.ltv} / $${computed.cac}`,
          result: `${computed.ltv_cac_ratio}:1`,
        });
      }

      // ── Blended ROAS (multi-channel aggregation) ──
      if ("channels" in payload && payload.total_spend === null) {
        const ch = payload.channels;
        const names = Object.keys(ch);
        let totalSpend = 0, totalRev = 0, totalConv = 0;
        const channelROAS = {};

        names.forEach(name => {
          totalSpend += ch[name].spend;
          totalRev += ch[name].attributed_revenue;
          totalConv += ch[name].conversions;
          channelROAS[name] = Math.round((ch[name].attributed_revenue / ch[name].spend) * 100) / 100;
        });

        computed.total_spend = Math.round(totalSpend * 100) / 100;
        computed.total_attributed_revenue = Math.round(totalRev * 100) / 100;
        computed.blended_roas = Math.round((totalRev / totalSpend) * 100) / 100;
        computed.cost_per_conversion = Math.round((totalSpend / totalConv) * 100) / 100;

        steps.push({
          type: "calculate",
          label: "Total Ad Spend",
          code: names.map(n => `$${ch[n].spend.toLocaleString()}`).join(" + "),
          result: `$${computed.total_spend.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Total Attributed Rev",
          code: names.map(n => `$${ch[n].attributed_revenue.toLocaleString()}`).join(" + "),
          result: `$${computed.total_attributed_revenue.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Blended ROAS",
          code: `$${computed.total_attributed_revenue.toLocaleString()} / $${computed.total_spend.toLocaleString()}`,
          result: `${computed.blended_roas}x`,
        });

        const sorted = names.sort((a, b) => channelROAS[b] - channelROAS[a]);
        computed.best_channel = `${sorted[0]} (${channelROAS[sorted[0]]}x ROAS)`;
        computed.worst_channel = `${sorted[sorted.length - 1]} (${channelROAS[sorted[sorted.length - 1]]}x ROAS)`;
        steps.push({
          type: "calculate",
          label: "Best / Worst Channel",
          code: names.map(n => `${n}: ${channelROAS[n]}x`).join(", "),
          result: `${sorted[0]} / ${sorted[sorted.length - 1]}`,
        });
        steps.push({
          type: "calculate",
          label: "Cost per Conversion",
          code: `$${computed.total_spend.toLocaleString()} / ${totalConv} conversions`,
          result: `$${computed.cost_per_conversion}`,
        });
      }

      // ── Cash Runway (burn rate + working capital) ──
      if ("cash_on_hand" in payload && "monthly_revenue" in payload && "monthly_cogs" in payload && "monthly_payroll" in payload && payload.monthly_burn === null) {
        const totalExpenses = payload.monthly_cogs + payload.monthly_payroll + payload.monthly_rent + payload.monthly_software + payload.monthly_marketing + payload.monthly_other;
        computed.monthly_burn = Math.round(totalExpenses * 100) / 100;
        computed.net_cash_flow = Math.round((payload.monthly_revenue - totalExpenses) * 100) / 100;
        computed.net_working_capital_adjustment = Math.round((payload.accounts_receivable - payload.accounts_payable) * 100) / 100;
        const effectiveCash = payload.cash_on_hand + computed.net_working_capital_adjustment;

        steps.push({
          type: "calculate",
          label: "Monthly Burn",
          code: `COGS + payroll + rent + software + marketing + other`,
          result: `$${computed.monthly_burn.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Net Cash Flow",
          code: `$${payload.monthly_revenue.toLocaleString()} revenue − $${computed.monthly_burn.toLocaleString()} expenses`,
          result: `$${computed.net_cash_flow.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Working Capital Adj.",
          code: `$${payload.accounts_receivable.toLocaleString()} AR − $${payload.accounts_payable.toLocaleString()} AP`,
          result: `$${computed.net_working_capital_adjustment.toLocaleString()}`,
        });

        if (computed.net_cash_flow < 0) {
          computed.runway_months = Math.round((effectiveCash / Math.abs(computed.net_cash_flow)) * 10) / 10;
          steps.push({
            type: "calculate",
            label: "Runway (months)",
            code: `($${payload.cash_on_hand.toLocaleString()} + $${computed.net_working_capital_adjustment.toLocaleString()}) / |$${computed.net_cash_flow.toLocaleString()}|`,
            result: `${computed.runway_months} months`,
          });
        } else {
          computed.runway_months = "Infinite (cash-flow positive)";
          steps.push({
            type: "calculate",
            label: "Runway",
            code: `Net cash flow is positive — not burning cash`,
            result: `Cash-flow positive`,
          });
        }
      }

      // ── Cohort Retention (retention rates + projected revenue) ──
      if ("initial_customers" in payload && "month_2_active" in payload && "month_3_active" in payload && payload.retention_rate_m2 === null) {
        computed.retention_rate_m2 = Math.round((payload.month_2_active / payload.initial_customers) * 10000) / 100;
        computed.retention_rate_m3 = Math.round((payload.month_3_active / payload.initial_customers) * 10000) / 100;

        const avgRevPerActive = Math.round(((payload.month_1_revenue / payload.month_1_active) + (payload.month_2_revenue / payload.month_2_active) + (payload.month_3_revenue / payload.month_3_active)) / 3 * 100) / 100;
        computed.avg_revenue_per_active = avgRevPerActive;

        steps.push({
          type: "calculate",
          label: "M2 Retention",
          code: `${payload.month_2_active} / ${payload.initial_customers} initial`,
          result: `${computed.retention_rate_m2}%`,
        });
        steps.push({
          type: "calculate",
          label: "M3 Retention",
          code: `${payload.month_3_active} / ${payload.initial_customers} initial`,
          result: `${computed.retention_rate_m3}%`,
        });
        steps.push({
          type: "calculate",
          label: "Avg Rev / Active User",
          code: `mean(M1: $${(payload.month_1_revenue/payload.month_1_active).toFixed(2)}, M2: $${(payload.month_2_revenue/payload.month_2_active).toFixed(2)}, M3: $${(payload.month_3_revenue/payload.month_3_active).toFixed(2)})`,
          result: `$${avgRevPerActive}`,
        });

        // Project using M2→M3 decay rate
        const decayRate = payload.month_3_active / payload.month_2_active;
        let projectedRev = payload.month_1_revenue + payload.month_2_revenue + payload.month_3_revenue;
        let activeUsers = payload.month_3_active;
        for (let m = 4; m <= 12; m++) {
          activeUsers = Math.round(activeUsers * decayRate);
          if (activeUsers < 1) break;
          projectedRev += activeUsers * avgRevPerActive;
        }
        computed.projected_12mo_revenue = Math.round(projectedRev * 100) / 100;

        steps.push({
          type: "calculate",
          label: "Decay Rate (M2→M3)",
          code: `${payload.month_3_active} / ${payload.month_2_active}`,
          result: `${Math.round(decayRate * 1000) / 1000}`,
        });
        steps.push({
          type: "calculate",
          label: "Projected 12mo Revenue",
          code: `Sum months 1-3 actual + months 4-12 projected at decay rate`,
          result: `$${computed.projected_12mo_revenue.toLocaleString()}`,
        });
      }

      const nullsRemaining = Object.entries(computed).filter(([k, v]) => v === null && k !== "channels").map(([k]) => k);
      if (nullsRemaining.length > 0) {
        steps.push({
          type: "guard",
          label: "Missing Data",
          code: `Null after computation: ${nullsRemaining.join(", ")}`,
          result: "Declare unavailable to LLM",
        });
      }

      return { computed, steps };
    }

    async function callDemoAPI(naiveSystem, naiveUser, hybridSystem, hybridUser) {
      const resp = await fetch("/api/demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          naive_system: naiveSystem,
          naive_user: naiveUser,
          hybrid_system: hybridSystem,
          hybrid_user: hybridUser,
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `API ${resp.status}: ${resp.statusText}`);
      }
      return await resp.json();
    }

    function Dots() {
      const [d, setD] = useState("");
      useEffect(() => {
        const iv = setInterval(() => setD(p => p.length >= 3 ? "" : p + "."), 350);
        return () => clearInterval(iv);
      }, []);
      return <span style={{ color: "#555", fontFamily: "var(--mono)" }}>thinking{d}</span>;
    }

    function StepLog({ steps, visible }) {
      const icons = { validate: "\u{1F50D}", calculate: "\u{1F9EE}", guard: "\u{1F6E1}\uFE0F" };
      const colors = { validate: "#3b82f6", calculate: "#10b981", guard: "#f59e0b" };
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {steps.map((s, i) => (
            <div key={i} style={{
              opacity: i < visible ? 1 : 0,
              transform: i < visible ? "translateY(0)" : "translateY(6px)",
              transition: "all 0.25s ease",
              borderLeft: `3px solid ${colors[s.type]}`,
              background: `${colors[s.type]}08`,
              borderRadius: "0 5px 5px 0",
              padding: "6px 9px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ fontSize: 12 }}>{icons[s.type]}</span>
                <strong style={{ fontSize: 10, color: colors[s.type], fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.04em" }}>
                  {s.label}
                </strong>
                <span style={{ fontSize: 11, color: "#6ee7b7", fontFamily: "var(--mono)", marginLeft: "auto", fontWeight: 500 }}>
                  {s.result}
                </span>
              </div>
              <code style={{ fontSize: 10, color: "#6b7280", fontFamily: "var(--mono)", display: "block", marginTop: 1 }}>
                {s.code}
              </code>
            </div>
          ))}
        </div>
      );
    }

    function HybridDemo() {
      const [activeIdx, setActiveIdx] = useState(0);
      const [phase, setPhase] = useState("idle");
      const [promptResult, setPromptResult] = useState("");
      const [hybridResult, setHybridResult] = useState("");
      const [computeSteps, setComputeSteps] = useState([]);
      const [visibleSteps, setVisibleSteps] = useState(0);
      const [showPayload, setShowPayload] = useState(false);
      const [error, setError] = useState(null);

      const scenario = SCENARIOS[activeIdx];

      const reset = () => {
        setPhase("idle");
        setPromptResult("");
        setHybridResult("");
        setComputeSteps([]);
        setVisibleSteps(0);
        setError(null);
      };

      useEffect(() => { reset(); setShowPayload(false); }, [activeIdx]);

      const runDemo = useCallback(async () => {
        reset();
        setPhase("running");
        try {
          const naiveSystem = `You are a financial analytics assistant for an ecommerce platform. Answer the seller's question using the JSON data provided. Be helpful, give specific numbers, and provide context like comparisons, benchmarks, or recommendations where you can.`;
          const naiveUser = `Seller question: "${scenario.question}"\n\nSeller data (JSON from platform API):\n${JSON.stringify(scenario.payload, null, 2)}`;

          const { computed, steps } = computeDerivedFields(scenario.payload);
          setComputeSteps(steps);
          for (let i = 1; i <= steps.length; i++) {
            await new Promise(r => setTimeout(r, 450));
            setVisibleSteps(i);
          }
          await new Promise(r => setTimeout(r, 250));

          const nullsRemaining = Object.entries(computed).filter(([, v]) => v === null).map(([k]) => k);
          const hybridSystem = `You are a financial analytics assistant. STRICT RULES:
1. All numbers are PRE-COMPUTED below. NEVER calculate, estimate, or infer any number yourself.
2. Fields listed as UNAVAILABLE have no data. Say "this data is not available" — do NOT guess or use training knowledge.
3. Do NOT reference industry benchmarks, historical averages, or external comparisons unless explicitly provided.
4. Do NOT make projections, forecasts, or trend claims unless multi-period data is provided.
5. Under 80 words. State facts, cite the pre-computed numbers, note what's missing.`;

          const hybridUser = `Seller question: "${scenario.question}"

PRE-COMPUTED DATA (use these numbers verbatim):
${JSON.stringify(computed, null, 2)}

UNAVAILABLE FIELDS (do not guess): ${nullsRemaining.length > 0 ? nullsRemaining.join(", ") : "none"}

Answer using ONLY the pre-computed data.`;

          const data = await callDemoAPI(naiveSystem, naiveUser, hybridSystem, hybridUser);
          setPromptResult(data.naive);
          setHybridResult(data.hybrid);
          setPhase("done");
        } catch (e) {
          setError(e.message);
          setPhase("error");
        }
      }, [scenario]);

      const cssVars = {
        "--mono": "'Fira Code', 'SF Mono', 'Consolas', monospace",
        "--sans": "'Libre Franklin', 'Helvetica Neue', sans-serif",
        "--display": "'Playfair Display', 'Georgia', serif",
      };

      // Main Demo
      return (
        <div style={{
          ...cssVars,
          minHeight: "100vh", background: "#07080d",
          color: "#dfe2ea", fontFamily: "var(--sans)", padding: "22px 16px",
        }}>
          {/* Header */}
          <div style={{ maxWidth: 1120, margin: "0 auto 18px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10b981", boxShadow: "0 0 8px #10b98155" }} />
                  <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#555d6f", letterSpacing: "0.1em", textTransform: "uppercase" }}>
                    Live &middot; Real Gemini API Calls &middot; Two Different Models
                  </span>
                </div>
                <h1 style={{ fontFamily: "var(--display)", fontSize: "clamp(22px,3.2vw,34px)", fontWeight: 700, color: "#f4f5f7", margin: 0, lineHeight: 1.1 }}>
                  Expensive Model <span style={{ color: "#555d6f", fontWeight: 400 }}>vs</span> Cheap Model + Architecture
                </h1>
              </div>
              <a href="/" style={{
                padding: "4px 10px", borderRadius: 5, border: "1px solid #1c1f2e",
                background: "transparent", color: "#555d6f", fontSize: 9,
                fontFamily: "var(--mono)", cursor: "pointer", textDecoration: "none",
              }}>
                Portfolio
              </a>
            </div>
            <p style={{ fontSize: 12, color: "#6b7280", marginTop: 4, maxWidth: 580, lineHeight: 1.5 }}>
              Left: the most expensive model with raw data and no guardrails.
              Right: the cheapest model with pre-validated, pre-computed data. Architecture wins.
            </p>
          </div>

          {/* Tabs */}
          <div style={{ maxWidth: 1120, margin: "0 auto 10px", display: "flex", gap: 6, flexWrap: "wrap" }}>
            {SCENARIOS.map((s, i) => (
              <button key={s.id} onClick={() => setActiveIdx(i)} style={{
                padding: "5px 14px", borderRadius: 5,
                border: activeIdx === i ? "1px solid #6366f1" : "1px solid #1c1f2e",
                background: activeIdx === i ? "#6366f110" : "#0d0e16",
                color: activeIdx === i ? "#a5b4fc" : "#555d6f",
                fontSize: 11, fontWeight: 500, cursor: "pointer",
                fontFamily: "var(--sans)", transition: "all 0.15s",
              }}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Query */}
          <div style={{ maxWidth: 1120, margin: "0 auto 12px" }}>
            <div style={{
              background: "#0d0e16", border: "1px solid #1c1f2e", borderRadius: 9,
              padding: "11px 14px",
              display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8,
            }}>
              <div>
                <div style={{ fontSize: 9, color: "#555d6f", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>
                  Seller asks:
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#f4f5f7" }}>"{scenario.question}"</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setShowPayload(p => !p)} style={{
                  padding: "4px 10px", borderRadius: 4, border: "1px solid #1c1f2e",
                  background: showPayload ? "#6366f108" : "transparent",
                  color: showPayload ? "#a5b4fc" : "#555d6f",
                  fontSize: 10, cursor: "pointer", fontFamily: "var(--mono)",
                }}>
                  {showPayload ? "Hide" : "View"} JSON
                </button>
                <button onClick={runDemo} disabled={phase === "running"} style={{
                  padding: "4px 16px", borderRadius: 4, border: "none",
                  background: phase === "running" ? "#1c1f2e" : "#f43f5e",
                  color: phase === "running" ? "#555" : "#fff",
                  fontSize: 11, fontWeight: 600,
                  cursor: phase === "running" ? "wait" : "pointer",
                  fontFamily: "var(--sans)",
                  boxShadow: phase !== "running" ? "0 2px 10px #f43f5e44" : "none",
                }}>
                  {phase === "idle" ? "\u25B6 Run Both Models" : phase === "running" ? "\u23F3 Calling..." : "\u21BB Run Again"}
                </button>
              </div>
            </div>
            {showPayload && (
              <pre style={{
                marginTop: 5, background: "#0a0b11", borderRadius: 6, padding: 10,
                fontSize: 10, color: "#6b7280", fontFamily: "var(--mono)",
                border: "1px solid #1c1f2e", overflow: "auto",
              }}>
                {JSON.stringify(scenario.payload, null, 2)}
              </pre>
            )}
          </div>

          {/* Results */}
          {phase !== "idle" && (
            <div style={{ maxWidth: 1120, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {/* LEFT — Expensive Model, No Guardrails */}
              <div style={{
                background: "#0d0e16", border: "1px solid #2a1520",
                borderTop: "3px solid #f43f5e", borderRadius: 9, padding: 14,
                display: "flex", flexDirection: "column",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 7 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#f43f5e" }} />
                    <span style={{ fontSize: 10, fontWeight: 600, color: "#f43f5e", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      Prompt-Only
                    </span>
                  </div>
                  <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#f43f5e", opacity: 0.7, padding: "2px 6px", border: "1px solid #f43f5e20", borderRadius: 3 }}>
                    Gemini 2.5 Pro &middot; $$$
                  </span>
                </div>
                <div style={{
                  fontSize: 9, color: "#5a3a3a", fontFamily: "var(--mono)",
                  padding: "3px 6px", background: "#f43f5e06", borderRadius: 3,
                  border: "1px solid #f43f5e10", marginBottom: 8,
                }}>
                  Most expensive model. Raw data. "Be helpful, give numbers, provide benchmarks."
                </div>
                <div style={{
                  flex: 1, fontSize: 13, lineHeight: 1.6, color: "#c8ccd4",
                  padding: "9px 11px", background: "#0a0b11", borderRadius: 6,
                  border: "1px solid #1c1f2e", minHeight: 90, whiteSpace: "pre-wrap",
                }}>
                  {promptResult || <Dots />}
                </div>
                {phase === "done" && (
                  <div style={{
                    marginTop: 8, padding: "7px 9px",
                    background: "#f43f5e08", borderRadius: 5, border: "1px solid #f43f5e12",
                  }}>
                    <div style={{ fontSize: 9, fontWeight: 600, color: "#f43f5e", fontFamily: "var(--mono)", marginBottom: 2 }}>
                      GEMINI 2.5 PRO &middot; NO VALIDATION
                    </div>
                    <div style={{ fontSize: 10, color: "#8b5a5a", lineHeight: 1.4 }}>
                      The most capable model money can buy. Check: Did it still invent benchmarks?
                      Do its own math (possibly wrong)? Claim trends from one data point?
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT — Cheapest Model + Architecture */}
              <div style={{
                background: "#0d0e16", border: "1px solid #15281f",
                borderTop: "3px solid #10b981", borderRadius: 9, padding: 14,
                display: "flex", flexDirection: "column",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 7 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10b981" }} />
                    <span style={{ fontSize: 10, fontWeight: 600, color: "#10b981", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      Hybrid System
                    </span>
                  </div>
                  <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#10b981", opacity: 0.7, padding: "2px 6px", border: "1px solid #10b98120", borderRadius: 3 }}>
                    Gemini 2.0 Flash Lite &middot; $
                  </span>
                </div>
                <div style={{
                  fontSize: 9, color: "#3a5a4a", fontFamily: "var(--mono)",
                  padding: "3px 6px", background: "#10b98106", borderRadius: 3,
                  border: "1px solid #10b98110", marginBottom: 8,
                }}>
                  Cheapest model. validate &rarr; compute (deterministic JS) &rarr; guard nulls &rarr; constrained generate
                </div>

                {computeSteps.length > 0 && (
                  <div style={{ marginBottom: 7 }}>
                    <div style={{ fontSize: 9, color: "#555d6f", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>
                      Pre-LLM Pipeline:
                    </div>
                    <StepLog steps={computeSteps} visible={visibleSteps} />
                  </div>
                )}

                {(visibleSteps >= computeSteps.length || phase === "done") && (
                  <div style={{
                    flex: 1, fontSize: 13, lineHeight: 1.6, color: "#c8ccd4",
                    padding: "9px 11px", background: "#0a0b11", borderRadius: 6,
                    border: "1px solid #1c1f2e", minHeight: 50, whiteSpace: "pre-wrap",
                  }}>
                    {hybridResult || <Dots />}
                  </div>
                )}

                {phase === "done" && (
                  <div style={{
                    marginTop: 8, padding: "7px 9px",
                    background: "#10b98108", borderRadius: 5, border: "1px solid #10b98112",
                  }}>
                    <div style={{ fontSize: 9, fontWeight: 600, color: "#10b981", fontFamily: "var(--mono)", marginBottom: 2 }}>
                      CHEAPEST MODEL &middot; BETTER RESULTS &middot; LOWER COST
                    </div>
                    <div style={{ fontSize: 10, color: "#5a8b6a", lineHeight: 1.4 }}>
                      All math computed in JavaScript before the cheapest LLM ran.
                      Architecture beats model size. Correct answers at a fraction of the cost.
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {error && (
            <div style={{
              maxWidth: 1120, margin: "12px auto", padding: "9px 12px",
              background: "#1a0a0a", border: "1px solid #5a1a1a", borderRadius: 6,
              color: "#f87171", fontSize: 11, fontFamily: "var(--mono)",
            }}>
              Error: {error}
              <button onClick={reset} style={{
                marginLeft: 10, padding: "2px 8px", borderRadius: 3,
                border: "1px solid #5a1a1a", background: "transparent",
                color: "#f87171", fontSize: 10, cursor: "pointer", fontFamily: "var(--mono)",
              }}>
                Retry
              </button>
            </div>
          )}

          {/* Architecture */}
          <div style={{ maxWidth: 1120, margin: "20px auto 0" }}>
            <div style={{ background: "#0d0e16", border: "1px solid #1c1f2e", borderRadius: 9, padding: "16px 18px" }}>
              <h3 style={{ fontFamily: "var(--display)", fontSize: 16, fontWeight: 700, color: "#f4f5f7", margin: "0 0 10px" }}>
                The Architecture
              </h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 7 }}>
                {[
                  { icon: "\u{1F4E5}", t: "Validate", d: "Detect nulls and missing fields before the LLM sees anything.", c: "#3b82f6" },
                  { icon: "\u{1F9EE}", t: "Compute", d: "All math in deterministic code. LLMs reason in tokens, not numbers.", c: "#10b981" },
                  { icon: "\u{1F6E1}\uFE0F", t: "Guard", d: "If data can't answer the question, declare it before generation.", c: "#f59e0b" },
                  { icon: "\u{1F4AC}", t: "Generate", d: "LLM writes language around verified facts. Reasoning, not fabrication.", c: "#8b5cf6" },
                ].map(s => (
                  <div key={s.t} style={{
                    padding: "10px 9px", background: `${s.c}05`,
                    border: `1px solid ${s.c}12`, borderTop: `2px solid ${s.c}`,
                    borderRadius: "0 0 6px 6px",
                  }}>
                    <div style={{ fontSize: 16, marginBottom: 2 }}>{s.icon}</div>
                    <div style={{ fontWeight: 600, fontSize: 10, color: s.c, fontFamily: "var(--mono)", marginBottom: 2 }}>{s.t}</div>
                    <div style={{ fontSize: 10, color: "#6b7280", lineHeight: 1.4 }}>{s.d}</div>
                  </div>
                ))}
              </div>
              <p style={{
                marginTop: 10, padding: "8px 11px",
                background: "#0a0b11", borderRadius: 5, border: "1px solid #1c1f2e",
                fontSize: 12, color: "#6b7280", lineHeight: 1.5, fontStyle: "italic",
              }}>
                The fix isn't a bigger model or better prompting. It's architecture. The cheapest model
                with validated data and constrained generation outperforms the most expensive model
                running blind. Route calculations through deterministic code. Let the LLM do what it's
                good at — language — and nothing else.
              </p>
            </div>
          </div>

          <div style={{ maxWidth: 1120, margin: "12px auto 0", textAlign: "center" }}>
            <span style={{ fontSize: 9, color: "#1e2030", fontFamily: "var(--mono)" }}>
              chris combs &middot; github.com/va2ai &middot; real gemini api calls, not simulated
            </span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('demo-root'));
    root.render(<HybridDemo />);
  </script>
</body>
</html>
