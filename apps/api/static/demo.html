    function computeDerivedFields(payload) {
      const computed = JSON.parse(JSON.stringify(payload));
      const steps = [];

      // ── LTV:CAC Ratio (4-step chain) ──
      if ("avg_order_value" in payload && "orders_per_customer_per_year" in payload && "gross_margin_pct" in payload && "avg_customer_lifespan_years" in payload && payload.ltv === null) {
        const annualValue = payload.avg_order_value * payload.orders_per_customer_per_year;
        const grossProfit = annualValue * payload.gross_margin_pct;
        computed.ltv = Math.round(grossProfit * payload.avg_customer_lifespan_years * 100) / 100;
        steps.push({
          type: "calculate",
          label: "Annual Customer Value",
          code: `$${payload.avg_order_value} × ${payload.orders_per_customer_per_year} orders/yr`,
          result: `$${annualValue.toFixed(2)}`,
        });
        steps.push({
          type: "calculate",
          label: "Annual Gross Profit",
          code: `$${annualValue.toFixed(2)} × ${payload.gross_margin_pct} margin`,
          result: `$${grossProfit.toFixed(2)}`,
        });
        steps.push({
          type: "calculate",
          label: "Lifetime Value (LTV)",
          code: `$${grossProfit.toFixed(2)} × ${payload.avg_customer_lifespan_years} years`,
          result: `$${computed.ltv.toLocaleString()}`,
        });
      }

      if ("ad_spend" in payload && "marketing_salaries" in payload && "marketing_software" in payload && "new_customers_acquired" in payload && payload.cac === null) {
        const totalMktg = payload.ad_spend + payload.marketing_salaries + payload.marketing_software;
        computed.cac = Math.round((totalMktg / payload.new_customers_acquired) * 100) / 100;
        steps.push({
          type: "calculate",
          label: "Total Acq. Cost",
          code: `$${payload.ad_spend.toLocaleString()} + $${payload.marketing_salaries.toLocaleString()} + $${payload.marketing_software.toLocaleString()}`,
          result: `$${totalMktg.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "CAC",
          code: `$${totalMktg.toLocaleString()} / ${payload.new_customers_acquired} customers`,
          result: `$${computed.cac}`,
        });
      }

      if (computed.ltv !== null && computed.cac !== null && payload.ltv_cac_ratio === null) {
        computed.ltv_cac_ratio = Math.round((computed.ltv / computed.cac) * 100) / 100;
        steps.push({
          type: "calculate",
          label: "LTV:CAC Ratio",
          code: `$${computed.ltv} / $${computed.cac}`,
          result: `${computed.ltv_cac_ratio}:1`,
        });
      }

      // ── Blended ROAS (multi-channel aggregation) ──
      if ("channels" in payload && payload.total_spend === null) {
        const ch = payload.channels;
        const names = Object.keys(ch);
        let totalSpend = 0, totalRev = 0, totalConv = 0;
        const channelROAS = {};

        names.forEach(name => {
          totalSpend += ch[name].spend;
          totalRev += ch[name].attributed_revenue;
          totalConv += ch[name].conversions;
          channelROAS[name] = Math.round((ch[name].attributed_revenue / ch[name].spend) * 100) / 100;
        });

        computed.total_spend = Math.round(totalSpend * 100) / 100;
        computed.total_attributed_revenue = Math.round(totalRev * 100) / 100;
        computed.blended_roas = Math.round((totalRev / totalSpend) * 100) / 100;
        computed.cost_per_conversion = Math.round((totalSpend / totalConv) * 100) / 100;

        steps.push({
          type: "calculate",
          label: "Total Ad Spend",
          code: names.map(n => `$${ch[n].spend.toLocaleString()}`).join(" + "),
          result: `$${computed.total_spend.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Total Attributed Rev",
          code: names.map(n => `$${ch[n].attributed_revenue.toLocaleString()}`).join(" + "),
          result: `$${computed.total_attributed_revenue.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Blended ROAS",
          code: `$${computed.total_attributed_revenue.toLocaleString()} / $${computed.total_spend.toLocaleString()}`,
          result: `${computed.blended_roas}x`,
        });

        const sorted = names.sort((a, b) => channelROAS[b] - channelROAS[a]);
        computed.best_channel = `${sorted[0]} (${channelROAS[sorted[0]]}x ROAS)`;
        computed.worst_channel = `${sorted[sorted.length - 1]} (${channelROAS[sorted[sorted.length - 1]]}x ROAS)`;
        steps.push({
          type: "calculate",
          label: "Best / Worst Channel",
          code: names.map(n => `${n}: ${channelROAS[n]}x`).join(", "),
          result: `${sorted[0]} / ${sorted[sorted.length - 1]}`,
        });
        steps.push({
          type: "calculate",
          label: "Cost per Conversion",
          code: `$${computed.total_spend.toLocaleString()} / ${totalConv} conversions`,
          result: `$${computed.cost_per_conversion}`,
        });
      }

      // ── Cash Runway (burn rate + working capital) ──
      if ("cash_on_hand" in payload && "monthly_revenue" in payload && "monthly_cogs" in payload && "monthly_payroll" in payload && payload.monthly_burn === null) {
        const totalExpenses = payload.monthly_cogs + payload.monthly_payroll + payload.monthly_rent + payload.monthly_software + payload.monthly_marketing + payload.monthly_other;
        computed.monthly_burn = Math.round(totalExpenses * 100) / 100;
        computed.net_cash_flow = Math.round((payload.monthly_revenue - totalExpenses) * 100) / 100;
        computed.net_working_capital_adjustment = Math.round((payload.accounts_receivable - payload.accounts_payable) * 100) / 100;
        const effectiveCash = payload.cash_on_hand + computed.net_working_capital_adjustment;

        steps.push({
          type: "calculate",
          label: "Monthly Burn",
          code: `COGS + payroll + rent + software + marketing + other`,
          result: `$${computed.monthly_burn.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Net Cash Flow",
          code: `$${payload.monthly_revenue.toLocaleString()} revenue − $${computed.monthly_burn.toLocaleString()} expenses`,
          result: `$${computed.net_cash_flow.toLocaleString()}`,
        });
        steps.push({
          type: "calculate",
          label: "Working Capital Adj.",
          code: `$${payload.accounts_receivable.toLocaleString()} AR − $${payload.accounts_payable.toLocaleString()} AP`,
          result: `$${computed.net_working_capital_adjustment.toLocaleString()}`,
        });

        if (computed.net_cash_flow < 0) {
          computed.runway_months = Math.round((effectiveCash / Math.abs(computed.net_cash_flow)) * 10) / 10;
          steps.push({
            type: "calculate",
            label: "Runway (months)",
            code: `($${payload.cash_on_hand.toLocaleString()} + $${computed.net_working_capital_adjustment.toLocaleString()}) / |$${computed.net_cash_flow.toLocaleString()}|`,
            result: `${computed.runway_months} months`,
          });
        } else {
          computed.runway_months = "Infinite (cash-flow positive)";
          steps.push({
            type: "calculate",
            label: "Runway",
            code: `Net cash flow is positive — not burning cash`,
            result: `Cash-flow positive`,
          });
        }
      }

      // ── Cohort Retention (retention rates + projected revenue) ──
      if ("initial_customers" in payload && "month_2_active" in payload && "month_3_active" in payload && payload.retention_rate_m2 === null) {
        computed.retention_rate_m2 = Math.round((payload.month_2_active / payload.initial_customers) * 10000) / 100;
        computed.retention_rate_m3 = Math.round((payload.month_3_active / payload.initial_customers) * 10000) / 100;

        const avgRevPerActive = Math.round(((payload.month_1_revenue / payload.month_1_active) + (payload.month_2_revenue / payload.month_2_active) + (payload.month_3_revenue / payload.month_3_active)) / 3 * 100) / 100;
        computed.avg_revenue_per_active = avgRevPerActive;

        steps.push({
          type: "calculate",
          label: "M2 Retention",
          code: `${payload.month_2_active} / ${payload.initial_customers} initial`,
          result: `${computed.retention_rate_m2}%`,
        });
        steps.push({
          type: "calculate",
          label: "M3 Retention",
          code: `${payload.month_3_active} / ${payload.initial_customers} initial`,
          result: `${computed.retention_rate_m3}%`,
        });
        steps.push({
          type: "calculate",
          label: "Avg Rev / Active User",
          code: `mean(M1: $${(payload.month_1_revenue/payload.month_1_active).toFixed(2)}, M2: $${(payload.month_2_revenue/payload.month_2_active).toFixed(2)}, M3: $${(payload.month_3_revenue/payload.month_3_active).toFixed(2)})`,
          result: `$${avgRevPerActive}`,
        });

        // Project using M2→M3 decay rate
        const decayRate = payload.month_3_active / payload.month_2_active;
        let projectedRev = payload.month_1_revenue + payload.month_2_revenue + payload.month_3_revenue;
        let activeUsers = payload.month_3_active;
        for (let m = 4; m <= 12; m++) {
          activeUsers = Math.round(activeUsers * decayRate);
          if (activeUsers < 1) break;
          projectedRev += activeUsers * avgRevPerActive;
        }
        computed.projected_12mo_revenue = Math.round(projectedRev * 100) / 100;

        steps.push({
          type: "calculate",
          label: "Decay Rate (M2→M3)",
          code: `${payload.month_3_active} / ${payload.month_2_active}`,
          result: `${Math.round(decayRate * 1000) / 1000}`,
        });
        steps.push({
          type: "calculate",
          label: "Projected 12mo Revenue",
          code: `Sum months 1-3 actual + months 4-12 projected at decay rate`,
          result: `$${computed.projected_12mo_revenue.toLocaleString()}`,
        });
      }

      // ── Multi-Product Margin ──
      if ("products" in payload && payload.product_margins === null) {
        const prods = payload.products;
        const margins = {};
        Object.keys(prods).forEach(name => {
          const p = prods[name];
          const netUnits = p.units_sold - p.returns;
          const revenue = netUnits * p.unit_price;
          const cost = netUnits * (p.unit_cost + p.shipping_per_unit);
          const profit = revenue - cost;
          const margin = revenue > 0 ? Math.round((profit / revenue) * 10000) / 100 : 0;
          margins[name] = { net_units: netUnits, revenue: Math.round(revenue * 100) / 100, profit: Math.round(profit * 100) / 100, margin };
          steps.push({ type: "calculate", label: `${name} margin`, code: `(${netUnits} units × $${p.unit_price} − ${netUnits} × ($${p.unit_cost} + $${p.shipping_per_unit})) / rev`, result: `${margin}%` });
        });
        computed.product_margins = margins;
        const sorted = Object.entries(margins).sort((a, b) => b[1].margin - a[1].margin);
        computed.best_product = `${sorted[0][0]} (${sorted[0][1].margin}%)`;
        computed.worst_product = `${sorted[sorted.length-1][0]} (${sorted[sorted.length-1][1].margin}%)`;
        const totalRev = Object.values(margins).reduce((s, m) => s + m.revenue, 0);
        const totalProfit = Object.values(margins).reduce((s, m) => s + m.profit, 0);
        computed.blended_margin = Math.round((totalProfit / totalRev) * 10000) / 100;
        steps.push({ type: "calculate", label: "Blended margin", code: `$${Math.round(totalProfit).toLocaleString()} / $${Math.round(totalRev).toLocaleString()}`, result: `${computed.blended_margin}%` });
      }

      // ── Break-Even Point ──
      if ("fixed_costs_rent" in payload && payload.total_fixed_costs === null) {
        const fc = payload.fixed_costs_rent + payload.fixed_costs_salaries + payload.fixed_costs_software + payload.fixed_costs_insurance + payload.fixed_costs_other;
        computed.total_fixed_costs = fc;
        computed.contribution_margin = Math.round((payload.avg_selling_price - payload.avg_variable_cost) * 100) / 100;
        computed.breakeven_units = Math.ceil(fc / computed.contribution_margin);
        computed.breakeven_revenue = Math.round(computed.breakeven_units * payload.avg_selling_price * 100) / 100;
        steps.push({ type: "calculate", label: "Total fixed costs", code: `rent + salaries + software + insurance + other`, result: `$${fc.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Contribution margin", code: `$${payload.avg_selling_price} − $${payload.avg_variable_cost}`, result: `$${computed.contribution_margin}` });
        steps.push({ type: "calculate", label: "Break-even units", code: `$${fc.toLocaleString()} / $${computed.contribution_margin}`, result: `${computed.breakeven_units} units` });
        steps.push({ type: "calculate", label: "Break-even revenue", code: `${computed.breakeven_units} × $${payload.avg_selling_price}`, result: `$${computed.breakeven_revenue.toLocaleString()}` });
      }

      // ── Inventory Health ──
      if ("current_inventory_value" in payload && "avg_daily_unit_sales" in payload && payload.days_of_inventory === null) {
        computed.days_of_inventory = Math.round(payload.units_in_stock / payload.avg_daily_unit_sales);
        computed.reorder_point = Math.round(payload.avg_daily_unit_sales * (payload.lead_time_days + payload.safety_stock_days));
        computed.overstock_status = computed.days_of_inventory > 90 ? "Overstocked" : computed.days_of_inventory < 30 ? "Understocked" : "Healthy";
        steps.push({ type: "calculate", label: "Days of inventory", code: `${payload.units_in_stock} units / ${payload.avg_daily_unit_sales} daily sales`, result: `${computed.days_of_inventory} days` });
        steps.push({ type: "calculate", label: "Reorder point", code: `${payload.avg_daily_unit_sales} × (${payload.lead_time_days} lead + ${payload.safety_stock_days} safety)`, result: `${computed.reorder_point} units` });
        steps.push({ type: "calculate", label: "Stock status", code: `${computed.days_of_inventory} days vs 30-90 healthy range`, result: computed.overstock_status });
      }

      // ── Churn Impact ──
      if ("customers_lost" in payload && "total_customers_start" in payload && payload.monthly_churn_rate === null) {
        computed.monthly_churn_rate = Math.round((payload.customers_lost / payload.total_customers_start) * 10000) / 100;
        computed.annual_churn_rate = Math.round((1 - Math.pow(1 - payload.customers_lost / payload.total_customers_start, 12)) * 10000) / 100;
        computed.monthly_revenue_lost = Math.round(payload.customers_lost * payload.avg_revenue_per_customer * 100) / 100;
        computed.annual_revenue_lost = Math.round(computed.monthly_revenue_lost * 12 * 100) / 100;
        const reducedChurn = (computed.monthly_churn_rate - 2) / 100;
        const savedCustomers = Math.round(payload.total_customers_start * 0.02);
        computed.revenue_saved_2pct_reduction = Math.round(savedCustomers * payload.avg_revenue_per_customer * 12 * 100) / 100;
        steps.push({ type: "calculate", label: "Monthly churn", code: `${payload.customers_lost} / ${payload.total_customers_start}`, result: `${computed.monthly_churn_rate}%` });
        steps.push({ type: "calculate", label: "Annual churn", code: `1 − (1 − ${computed.monthly_churn_rate/100})^12`, result: `${computed.annual_churn_rate}%` });
        steps.push({ type: "calculate", label: "Monthly rev lost", code: `${payload.customers_lost} × $${payload.avg_revenue_per_customer}`, result: `$${computed.monthly_revenue_lost.toLocaleString()}` });
        steps.push({ type: "calculate", label: "2% reduction saves", code: `${savedCustomers} saved customers × $${payload.avg_revenue_per_customer} × 12 months`, result: `$${computed.revenue_saved_2pct_reduction.toLocaleString()}/yr` });
      }

      // ── CAC Payback ──
      if ("total_acquisition_spend" in payload && "new_customers" in payload && "avg_monthly_revenue_per_customer" in payload && payload.cac === null && !("marketing_salaries" in payload)) {
        computed.cac = Math.round((payload.total_acquisition_spend / payload.new_customers) * 100) / 100;
        computed.monthly_gross_profit_per_customer = Math.round(payload.avg_monthly_revenue_per_customer * payload.gross_margin_pct * 100) / 100;
        computed.payback_months = Math.round((computed.cac / computed.monthly_gross_profit_per_customer) * 10) / 10;
        steps.push({ type: "calculate", label: "CAC", code: `$${payload.total_acquisition_spend.toLocaleString()} / ${payload.new_customers}`, result: `$${computed.cac}` });
        steps.push({ type: "calculate", label: "Monthly gross profit/cust", code: `$${payload.avg_monthly_revenue_per_customer} × ${payload.gross_margin_pct}`, result: `$${computed.monthly_gross_profit_per_customer}` });
        steps.push({ type: "calculate", label: "Payback period", code: `$${computed.cac} / $${computed.monthly_gross_profit_per_customer}`, result: `${computed.payback_months} months` });
      }

      // ── AOV Analysis ──
      if ("total_orders" in payload && "single_item_orders" in payload && payload.overall_aov === null) {
        computed.overall_aov = Math.round((payload.total_revenue / payload.total_orders) * 100) / 100;
        computed.single_item_aov = Math.round((payload.single_item_revenue / payload.single_item_orders) * 100) / 100;
        computed.multi_item_aov = Math.round((payload.multi_item_revenue / payload.multi_item_orders) * 100) / 100;
        computed.bundle_lift_pct = Math.round(((computed.multi_item_aov - computed.single_item_aov) / computed.single_item_aov) * 10000) / 100;
        steps.push({ type: "calculate", label: "Overall AOV", code: `$${payload.total_revenue.toLocaleString()} / ${payload.total_orders}`, result: `$${computed.overall_aov}` });
        steps.push({ type: "calculate", label: "Single-item AOV", code: `$${payload.single_item_revenue.toLocaleString()} / ${payload.single_item_orders}`, result: `$${computed.single_item_aov}` });
        steps.push({ type: "calculate", label: "Multi-item AOV", code: `$${payload.multi_item_revenue.toLocaleString()} / ${payload.multi_item_orders}`, result: `$${computed.multi_item_aov}` });
        steps.push({ type: "calculate", label: "Bundle lift", code: `($${computed.multi_item_aov} − $${computed.single_item_aov}) / $${computed.single_item_aov}`, result: `+${computed.bundle_lift_pct}%` });
      }

      // ── Gross vs Net Revenue ──
      if ("gross_revenue" in payload && "discounts" in payload && "chargebacks" in payload && payload.net_revenue === null) {
        computed.net_revenue = Math.round((payload.gross_revenue - payload.discounts - payload.returns - payload.chargebacks - (payload.shipping_paid - payload.shipping_collected)) * 100) / 100;
        computed.discount_rate = Math.round((payload.discounts / payload.gross_revenue) * 10000) / 100;
        computed.return_rate = Math.round((payload.returns / payload.gross_revenue) * 10000) / 100;
        computed.shipping_loss = Math.round((payload.shipping_paid - payload.shipping_collected) * 100) / 100;
        steps.push({ type: "calculate", label: "Net revenue", code: `$${payload.gross_revenue.toLocaleString()} − discounts − returns − chargebacks − shipping loss`, result: `$${computed.net_revenue.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Discount rate", code: `$${payload.discounts.toLocaleString()} / $${payload.gross_revenue.toLocaleString()}`, result: `${computed.discount_rate}%` });
        steps.push({ type: "calculate", label: "Shipping loss", code: `$${payload.shipping_paid.toLocaleString()} paid − $${payload.shipping_collected.toLocaleString()} collected`, result: `$${computed.shipping_loss}` });
      }

      // ── Funnel Conversion ──
      if ("visitors" in payload && "product_views" in payload && "add_to_cart" in payload && payload.browse_to_view_rate === null) {
        computed.browse_to_view_rate = Math.round((payload.product_views / payload.visitors) * 10000) / 100;
        computed.view_to_cart_rate = Math.round((payload.add_to_cart / payload.product_views) * 10000) / 100;
        computed.cart_to_checkout_rate = Math.round((payload.checkout_started / payload.add_to_cart) * 10000) / 100;
        computed.checkout_to_purchase_rate = Math.round((payload.orders_completed / payload.checkout_started) * 10000) / 100;
        computed.overall_conversion_rate = Math.round((payload.orders_completed / payload.visitors) * 10000) / 100;
        const rates = [
          { stage: "Browse→View", rate: computed.browse_to_view_rate },
          { stage: "View→Cart", rate: computed.view_to_cart_rate },
          { stage: "Cart→Checkout", rate: computed.cart_to_checkout_rate },
          { stage: "Checkout→Purchase", rate: computed.checkout_to_purchase_rate },
        ];
        computed.biggest_dropoff = rates.reduce((min, r) => r.rate < min.rate ? r : min).stage;
        rates.forEach(r => steps.push({ type: "calculate", label: r.stage, code: `conversion rate`, result: `${r.rate}%` }));
        steps.push({ type: "calculate", label: "Biggest dropoff", code: `lowest conversion stage`, result: computed.biggest_dropoff });
      }

      // ── Shipping Efficiency ──
      if ("total_orders_shipped" in payload && "carrier_costs" in payload && "warehouse_labor_shipping" in payload && payload.true_cost_per_order === null) {
        const totalCost = payload.carrier_costs + payload.packaging_materials + payload.warehouse_labor_shipping;
        computed.true_cost_per_order = Math.round((totalCost / payload.total_orders_shipped) * 100) / 100;
        computed.shipping_deficit = Math.round((payload.shipping_revenue_collected - totalCost) * 100) / 100;
        computed.free_shipping_subsidy = Math.round((payload.free_shipping_orders * computed.true_cost_per_order) * 100) / 100;
        steps.push({ type: "calculate", label: "True cost/order", code: `($${payload.carrier_costs.toLocaleString()} + $${payload.packaging_materials} + $${payload.warehouse_labor_shipping.toLocaleString()}) / ${payload.total_orders_shipped}`, result: `$${computed.true_cost_per_order}` });
        steps.push({ type: "calculate", label: "Shipping deficit", code: `$${payload.shipping_revenue_collected.toLocaleString()} collected − $${totalCost.toLocaleString()} cost`, result: `$${computed.shipping_deficit}` });
        steps.push({ type: "calculate", label: "Free shipping subsidy", code: `${payload.free_shipping_orders} orders × $${computed.true_cost_per_order}`, result: `$${computed.free_shipping_subsidy.toLocaleString()}` });
      }

      // ── Refund Analysis ──
      if ("total_refunds" in payload && "original_payment_processing_fee_pct" in payload && payload.total_refund_cost === null) {
        const avgRefund = payload.refund_amount / payload.total_refunds;
        computed.lost_processing_fees = Math.round((payload.refund_amount * payload.original_payment_processing_fee_pct + payload.total_refunds * payload.original_payment_fixed_fee) * 100) / 100;
        computed.restocking_cost = Math.round(payload.total_refunds * payload.restocking_labor_per_unit * 100) / 100;
        computed.unsellable_loss = Math.round(payload.total_refunds * payload.unsellable_pct * payload.avg_item_cost * 100) / 100;
        computed.total_refund_cost = Math.round((payload.refund_amount + computed.lost_processing_fees + computed.restocking_cost + computed.unsellable_loss) * 100) / 100;
        computed.true_cost_per_refund = Math.round((computed.total_refund_cost / payload.total_refunds) * 100) / 100;
        steps.push({ type: "calculate", label: "Lost processing fees", code: `$${payload.refund_amount} × ${payload.original_payment_processing_fee_pct} + ${payload.total_refunds} × $${payload.original_payment_fixed_fee}`, result: `$${computed.lost_processing_fees}` });
        steps.push({ type: "calculate", label: "Restocking cost", code: `${payload.total_refunds} × $${payload.restocking_labor_per_unit}`, result: `$${computed.restocking_cost}` });
        steps.push({ type: "calculate", label: "Unsellable loss", code: `${payload.total_refunds} × ${payload.unsellable_pct} × $${payload.avg_item_cost}`, result: `$${computed.unsellable_loss}` });
        steps.push({ type: "calculate", label: "True cost/refund", code: `$${computed.total_refund_cost.toLocaleString()} / ${payload.total_refunds}`, result: `$${computed.true_cost_per_refund}` });
      }

      // ── Email Campaign ROI ──
      if ("emails_sent" in payload && "esp_cost" in payload && payload.open_rate === null) {
        computed.open_rate = Math.round((payload.opens / payload.emails_sent) * 10000) / 100;
        computed.click_rate = Math.round((payload.clicks / payload.emails_sent) * 10000) / 100;
        computed.conversion_rate = Math.round((payload.conversions / payload.clicks) * 10000) / 100;
        computed.total_cost = Math.round((payload.esp_cost + payload.copywriter_cost + payload.design_cost) * 100) / 100;
        computed.roi_pct = Math.round(((payload.email_revenue - computed.total_cost) / computed.total_cost) * 10000) / 100;
        computed.revenue_per_email = Math.round((payload.email_revenue / payload.emails_sent) * 10000) / 10000;
        steps.push({ type: "calculate", label: "Open rate", code: `${payload.opens} / ${payload.emails_sent}`, result: `${computed.open_rate}%` });
        steps.push({ type: "calculate", label: "Click rate", code: `${payload.clicks} / ${payload.emails_sent}`, result: `${computed.click_rate}%` });
        steps.push({ type: "calculate", label: "Total cost", code: `ESP + copywriter + design`, result: `$${computed.total_cost.toLocaleString()}` });
        steps.push({ type: "calculate", label: "ROI", code: `($${payload.email_revenue.toLocaleString()} − $${computed.total_cost}) / $${computed.total_cost}`, result: `${computed.roi_pct}%` });
      }

      // ── Discount Impact ──
      if ("normal_daily_orders" in payload && "sale_days" in payload && payload.sale_revenue === null) {
        computed.sale_revenue = Math.round(payload.sale_days * payload.sale_orders_per_day * payload.sale_aov * 100) / 100;
        computed.counterfactual_revenue = Math.round(payload.sale_days * payload.normal_daily_orders * payload.normal_aov * 100) / 100;
        computed.incremental_revenue = Math.round((computed.sale_revenue - computed.counterfactual_revenue) * 100) / 100;
        computed.sale_gross_profit = Math.round(computed.sale_revenue * (payload.normal_margin_pct - payload.discount_pct) * 100) / 100;
        computed.counterfactual_gross_profit = Math.round(computed.counterfactual_revenue * payload.normal_margin_pct * 100) / 100;
        computed.net_profit_impact = Math.round((computed.sale_gross_profit - computed.counterfactual_gross_profit) * 100) / 100;
        steps.push({ type: "calculate", label: "Sale revenue", code: `${payload.sale_days} days × ${payload.sale_orders_per_day} orders × $${payload.sale_aov}`, result: `$${computed.sale_revenue.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Counterfactual", code: `${payload.sale_days} days × ${payload.normal_daily_orders} orders × $${payload.normal_aov}`, result: `$${computed.counterfactual_revenue.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Sale gross profit", code: `$${computed.sale_revenue.toLocaleString()} × (${payload.normal_margin_pct} − ${payload.discount_pct})`, result: `$${computed.sale_gross_profit.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Net profit impact", code: `sale profit − counterfactual profit`, result: `$${computed.net_profit_impact.toLocaleString()}` });
      }

      // ── Warehouse Efficiency ──
      if ("total_orders_fulfilled" in payload && "warehouse_rent" in payload && "picking_errors" in payload && payload.cost_per_order === null) {
        const totalCost = payload.warehouse_rent + payload.warehouse_utilities + payload.warehouse_labor + payload.packaging_materials + payload.equipment_depreciation;
        computed.cost_per_order = Math.round((totalCost / payload.total_orders_fulfilled) * 100) / 100;
        computed.error_rate = Math.round((payload.picking_errors / payload.total_orders_fulfilled) * 10000) / 100;
        computed.total_error_cost = Math.round(payload.picking_errors * payload.error_reshipment_cost * 100) / 100;
        computed.labor_cost_per_order = Math.round((payload.warehouse_labor / payload.total_orders_fulfilled) * 100) / 100;
        steps.push({ type: "calculate", label: "Cost per order", code: `$${totalCost.toLocaleString()} total / ${payload.total_orders_fulfilled} orders`, result: `$${computed.cost_per_order}` });
        steps.push({ type: "calculate", label: "Error rate", code: `${payload.picking_errors} / ${payload.total_orders_fulfilled}`, result: `${computed.error_rate}%` });
        steps.push({ type: "calculate", label: "Error cost", code: `${payload.picking_errors} × $${payload.error_reshipment_cost}`, result: `$${computed.total_error_cost}` });
      }

      // ── Payment Processing ──
      if ("credit_card_volume" in payload && "paypal_volume" in payload && payload.total_processing_fees === null) {
        const ccFees = Math.round((payload.credit_card_volume * payload.cc_rate + payload.credit_card_txns * payload.cc_fixed) * 100) / 100;
        const ppFees = Math.round((payload.paypal_volume * payload.paypal_rate + payload.paypal_txns * payload.paypal_fixed) * 100) / 100;
        const bnplFees = Math.round((payload.bnpl_volume * payload.bnpl_rate) * 100) / 100;
        computed.total_processing_fees = Math.round((ccFees + ppFees + bnplFees) * 100) / 100;
        const totalVol = payload.credit_card_volume + payload.paypal_volume + payload.bnpl_volume;
        const totalTxns = payload.credit_card_txns + payload.paypal_txns + payload.bnpl_txns;
        computed.effective_rate = Math.round((computed.total_processing_fees / totalVol) * 10000) / 100;
        computed.cost_per_transaction = Math.round((computed.total_processing_fees / totalTxns) * 100) / 100;
        steps.push({ type: "calculate", label: "CC fees", code: `$${payload.credit_card_volume.toLocaleString()} × ${payload.cc_rate} + ${payload.credit_card_txns} × $${payload.cc_fixed}`, result: `$${ccFees}` });
        steps.push({ type: "calculate", label: "PayPal fees", code: `$${payload.paypal_volume.toLocaleString()} × ${payload.paypal_rate} + ${payload.paypal_txns} × $${payload.paypal_fixed}`, result: `$${ppFees}` });
        steps.push({ type: "calculate", label: "BNPL fees", code: `$${payload.bnpl_volume.toLocaleString()} × ${payload.bnpl_rate}`, result: `$${bnplFees}` });
        steps.push({ type: "calculate", label: "Effective rate", code: `$${computed.total_processing_fees} / $${totalVol.toLocaleString()}`, result: `${computed.effective_rate}%` });
      }

      // ── Sales Tax Estimate ──
      if ("states" in payload && payload.state_liabilities === null) {
        const st = payload.states;
        computed.state_liabilities = {};
        let total = 0;
        let totalSales = 0;
        Object.keys(st).forEach(s => {
          const liability = Math.round(st[s].taxable_sales * st[s].rate * 100) / 100;
          computed.state_liabilities[s] = liability;
          total += liability;
          totalSales += st[s].taxable_sales;
          steps.push({ type: "calculate", label: `${s} tax`, code: `$${st[s].taxable_sales.toLocaleString()} × ${(st[s].rate * 100).toFixed(2)}%`, result: `$${liability.toLocaleString()}` });
        });
        computed.total_liability = Math.round(total * 100) / 100;
        computed.effective_rate = Math.round((total / totalSales) * 10000) / 100;
        steps.push({ type: "calculate", label: "Total liability", code: `sum of all states`, result: `$${computed.total_liability.toLocaleString()}` });
      }

      // ── COGS Breakdown ──
      if ("raw_product_cost" in payload && "inbound_freight" in payload && "customs_duties" in payload && payload.landed_cost_per_unit === null) {
        const totalBeforeShrink = payload.raw_product_cost + payload.inbound_freight + payload.customs_duties + payload.quality_inspection;
        computed.shrinkage_cost = Math.round(totalBeforeShrink * payload.shrinkage_pct * 100) / 100;
        computed.total_cogs = Math.round((totalBeforeShrink + computed.shrinkage_cost) * 100) / 100;
        computed.landed_cost_per_unit = Math.round((computed.total_cogs / payload.units_purchased) * 100) / 100;
        steps.push({ type: "calculate", label: "Pre-shrinkage cost", code: `product + freight + duties + inspection`, result: `$${totalBeforeShrink.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Shrinkage cost", code: `$${totalBeforeShrink.toLocaleString()} × ${payload.shrinkage_pct}`, result: `$${computed.shrinkage_cost}` });
        steps.push({ type: "calculate", label: "Landed cost/unit", code: `$${computed.total_cogs.toLocaleString()} / ${payload.units_purchased} units`, result: `$${computed.landed_cost_per_unit}` });
      }

      // ── Subscription Metrics ──
      if ("active_subscribers_start" in payload && "new_subscribers" in payload && payload.active_subscribers_end === null) {
        computed.active_subscribers_end = payload.active_subscribers_start + payload.new_subscribers - payload.churned_subscribers;
        computed.mrr = Math.round(computed.active_subscribers_end * payload.avg_subscription_price * 100) / 100;
        computed.expansion_mrr = Math.round(payload.upgraded_subscribers * payload.upgrade_avg_increase * 100) / 100;
        computed.contraction_mrr = Math.round(payload.downgraded_subscribers * payload.downgrade_avg_decrease * 100) / 100;
        computed.churn_mrr = Math.round(payload.churned_subscribers * payload.avg_subscription_price * 100) / 100;
        computed.net_new_mrr = Math.round((payload.new_subscribers * payload.avg_subscription_price + computed.expansion_mrr - computed.contraction_mrr - computed.churn_mrr) * 100) / 100;
        steps.push({ type: "calculate", label: "End subscribers", code: `${payload.active_subscribers_start} + ${payload.new_subscribers} − ${payload.churned_subscribers}`, result: `${computed.active_subscribers_end}` });
        steps.push({ type: "calculate", label: "MRR", code: `${computed.active_subscribers_end} × $${payload.avg_subscription_price}`, result: `$${computed.mrr.toLocaleString()}` });
        steps.push({ type: "calculate", label: "Net new MRR", code: `new + expansion − contraction − churn`, result: `$${computed.net_new_mrr.toLocaleString()}` });
      }

      // ── Ad Attribution ──
      if ("last_click_conversions" in payload && "attribution_weights" in payload && payload.weighted_conversions === null) {
        const w = payload.attribution_weights;
        computed.weighted_conversions = Math.round((payload.last_click_conversions * w.last_click + payload.assisted_conversions * w.assisted + payload.view_through_conversions * w.view_through) * 100) / 100;
        computed.effective_cpa = Math.round((payload.total_ad_spend / computed.weighted_conversions) * 100) / 100;
        computed.naive_cpa = Math.round((payload.total_ad_spend / payload.last_click_conversions) * 100) / 100;
        steps.push({ type: "calculate", label: "Weighted conversions", code: `${payload.last_click_conversions}×${w.last_click} + ${payload.assisted_conversions}×${w.assisted} + ${payload.view_through_conversions}×${w.view_through}`, result: `${computed.weighted_conversions}` });
        steps.push({ type: "calculate", label: "Effective CPA", code: `$${payload.total_ad_spend.toLocaleString()} / ${computed.weighted_conversions}`, result: `$${computed.effective_cpa}` });
        steps.push({ type: "calculate", label: "Naive CPA (last-click)", code: `$${payload.total_ad_spend.toLocaleString()} / ${payload.last_click_conversions}`, result: `$${computed.naive_cpa}` });
      }

      // ── Seasonal Adjustment ──
      if ("prior_year_same_month" in payload && "prior_year_annual" in payload && payload.seasonal_index === null) {
        computed.prior_year_march_share = Math.round((payload.prior_year_same_month / payload.prior_year_annual) * 10000) / 100;
        computed.seasonal_index = Math.round((computed.prior_year_march_share / (100/12)) * 100) / 100;
        computed.deseasonalized_revenue = Math.round((payload.current_revenue / computed.seasonal_index) * 100) / 100;
        computed.yoy_growth = Math.round(((payload.current_revenue - payload.prior_year_same_month) / payload.prior_year_same_month) * 10000) / 100;
        const expectedRevenue = Math.round(payload.prior_year_annual * (computed.prior_year_march_share / 100) * (1 + computed.yoy_growth / 100));
        computed.real_growth_adjusted = Math.round(((payload.current_revenue - payload.prior_year_same_month) / payload.prior_year_same_month) * 10000) / 100;
        steps.push({ type: "calculate", label: "March share (prior yr)", code: `$${payload.prior_year_same_month.toLocaleString()} / $${payload.prior_year_annual.toLocaleString()}`, result: `${computed.prior_year_march_share}%` });
        steps.push({ type: "calculate", label: "Seasonal index", code: `${computed.prior_year_march_share}% / ${(100/12).toFixed(2)}% (even share)`, result: `${computed.seasonal_index}` });
        steps.push({ type: "calculate", label: "Deseasonalized rev", code: `$${payload.current_revenue.toLocaleString()} / ${computed.seasonal_index}`, result: `$${computed.deseasonalized_revenue.toLocaleString()}` });
        steps.push({ type: "calculate", label: "YoY growth", code: `($${payload.current_revenue.toLocaleString()} − $${payload.prior_year_same_month.toLocaleString()}) / $${payload.prior_year_same_month.toLocaleString()}`, result: `${computed.yoy_growth}%` });
      }

      const nullsRemaining = Object.entries(computed).filter(([k, v]) => v === null && !["channels","products","states","attribution_weights"].includes(k)).map(([k]) => k);
      if (nullsRemaining.length > 0) {
        steps.push({
          type: "guard",
          label: "Missing Data",
          code: `Null after computation: ${nullsRemaining.join(", ")}`,
          result: "Declare unavailable to LLM",
        });
      }

      return { computed, steps };
    }

    async function callDemoAPI(naiveSystem, naiveUser, hybridSystem, hybridUser) {
      const resp = await fetch("/api/demo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          naive_system: naiveSystem,
          naive_user: naiveUser,
          hybrid_system: hybridSystem,
          hybrid_user: hybridUser,
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `API ${resp.status}: ${resp.statusText}`);
      }
      return await resp.json();
    }

                  flex: 1, fontSize: 13, lineHeight: 1.6, color: "#c8ccd4",
                  padding: "9px 11px", background: "#0a0b11", borderRadius: 6,
                  border: "1px solid #1c1f2e", minHeight: 90, whiteSpace: "pre-wrap",
                }}>
                  {promptResult || <Dots />}
                </div>
                {phase === "done" && (
                  <div style={{
                    marginTop: 8, padding: "7px 9px",
                    background: "#f43f5e08", borderRadius: 5, border: "1px solid #f43f5e12",
                  }}>
                    <div style={{ fontSize: 9, fontWeight: 600, color: "#f43f5e", fontFamily: "var(--mono)", marginBottom: 2 }}>
                      GEMINI 2.5 FLASH &middot; NO VALIDATION
                    </div>
                    <div style={{ fontSize: 10, color: "#8b5a5a", lineHeight: 1.4 }}>
                      A capable, expensive model with raw data. Check: Did it invent benchmarks?
                      Do its own math (possibly wrong)? Claim trends from one data point?
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT — Cheapest Model + Architecture */}
              <div style={{
                background: "#0d0e16", border: "1px solid #15281f",
                borderTop: "3px solid #10b981", borderRadius: 9, padding: 14,
                display: "flex", flexDirection: "column",
              }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 7 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10b981" }} />
                    <span style={{ fontSize: 10, fontWeight: 600, color: "#10b981", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      Hybrid System
                    </span>
                  </div>
                  <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#10b981", opacity: 0.7, padding: "2px 6px", border: "1px solid #10b98120", borderRadius: 3 }}>
                    Gemini 2.0 Flash Lite &middot; $
                  </span>
                </div>
                <div style={{
                  fontSize: 9, color: "#3a5a4a", fontFamily: "var(--mono)",
                  padding: "3px 6px", background: "#10b98106", borderRadius: 3,
                  border: "1px solid #10b98110", marginBottom: 8,
                }}>
                  Cheapest model. validate &rarr; compute (deterministic JS) &rarr; guard nulls &rarr; constrained generate
                </div>

                {computeSteps.length > 0 && (
                  <div style={{ marginBottom: 7 }}>
                    <div style={{ fontSize: 9, color: "#555d6f", fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>
                      Pre-LLM Pipeline:
                    </div>
                    <StepLog steps={computeSteps} visible={visibleSteps} />
                  </div>
                )}

                {(visibleSteps >= computeSteps.length || phase === "done") && (
                  <div style={{
                    flex: 1, fontSize: 13, lineHeight: 1.6, color: "#c8ccd4",
                    padding: "9px 11px", background: "#0a0b11", borderRadius: 6,
                    border: "1px solid #1c1f2e", minHeight: 50, whiteSpace: "pre-wrap",
                  }}>
                    {hybridResult || <Dots />}
                  </div>
                )}

                {phase === "done" && (
                  <div style={{
                    marginTop: 8, padding: "7px 9px",
                    background: "#10b98108", borderRadius: 5, border: "1px solid #10b98112",
                  }}>
                    <div style={{ fontSize: 9, fontWeight: 600, color: "#10b981", fontFamily: "var(--mono)", marginBottom: 2 }}>
                      CHEAPEST MODEL &middot; BETTER RESULTS &middot; LOWER COST
                    </div>
                    <div style={{ fontSize: 10, color: "#5a8b6a", lineHeight: 1.4 }}>
                      All math computed in JavaScript before the cheapest LLM ran.
                      Architecture beats model size. Correct answers at a fraction of the cost.
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {error && (
            <div style={{
              maxWidth: 1120, margin: "12px auto", padding: "9px 12px",
              background: "#1a0a0a", border: "1px solid #5a1a1a", borderRadius: 6,
              color: "#f87171", fontSize: 11, fontFamily: "var(--mono)",
            }}>
              Error: {error}
              <button onClick={reset} style={{
                marginLeft: 10, padding: "2px 8px", borderRadius: 3,
                border: "1px solid #5a1a1a", background: "transparent",
                color: "#f87171", fontSize: 10, cursor: "pointer", fontFamily: "var(--mono)",
              }}>
                Retry
              </button>
            </div>
          )}

          {/* Architecture */}
          <div style={{ maxWidth: 1120, margin: "20px auto 0" }}>
            <div style={{ background: "#0d0e16", border: "1px solid #1c1f2e", borderRadius: 9, padding: "16px 18px" }}>
              <h3 style={{ fontFamily: "var(--display)", fontSize: 16, fontWeight: 700, color: "#f4f5f7", margin: "0 0 10px" }}>
                The Architecture
              </h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 7 }}>
                {[
                  { icon: "\u{1F4E5}", t: "Validate", d: "Detect nulls and missing fields before the LLM sees anything.", c: "#3b82f6" },
                  { icon: "\u{1F9EE}", t: "Compute", d: "All math in deterministic code. LLMs reason in tokens, not numbers.", c: "#10b981" },
                  { icon: "\u{1F6E1}\uFE0F", t: "Guard", d: "If data can't answer the question, declare it before generation.", c: "#f59e0b" },
                  { icon: "\u{1F4AC}", t: "Generate", d: "LLM writes language around verified facts. Reasoning, not fabrication.", c: "#8b5cf6" },
                ].map(s => (
                  <div key={s.t} style={{
                    padding: "10px 9px", background: `${s.c}05`,
                    border: `1px solid ${s.c}12`, borderTop: `2px solid ${s.c}`,
                    borderRadius: "0 0 6px 6px",
                  }}>
                    <div style={{ fontSize: 16, marginBottom: 2 }}>{s.icon}</div>
                    <div style={{ fontWeight: 600, fontSize: 10, color: s.c, fontFamily: "var(--mono)", marginBottom: 2 }}>{s.t}</div>
                    <div style={{ fontSize: 10, color: "#6b7280", lineHeight: 1.4 }}>{s.d}</div>
                  </div>
                ))}
              </div>
              <p style={{
                marginTop: 10, padding: "8px 11px",
                background: "#0a0b11", borderRadius: 5, border: "1px solid #1c1f2e",
                fontSize: 12, color: "#6b7280", lineHeight: 1.5, fontStyle: "italic",
              }}>
                The fix isn't a bigger model or better prompting. It's architecture. The cheapest model
                with validated data and constrained generation outperforms the most expensive model
                running blind. Route calculations through deterministic code. Let the LLM do what it's
                good at — language — and nothing else.
              </p>
            </div>
          </div>

          <div style={{ maxWidth: 1120, margin: "12px auto 0", textAlign: "center" }}>
            <span style={{ fontSize: 9, color: "#1e2030", fontFamily: "var(--mono)" }}>
              chris combs &middot; github.com/va2ai &middot; real gemini api calls, not simulated
            </span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('demo-root'));
    root.render(<HybridDemo />);
  </script>
</body>
</html>
